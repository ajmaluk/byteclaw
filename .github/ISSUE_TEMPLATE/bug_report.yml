name: Bug report
description: Report a problem to help us improve
labels: [bug, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `byteclaw version`
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Be as specific as possible
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or screenshots
