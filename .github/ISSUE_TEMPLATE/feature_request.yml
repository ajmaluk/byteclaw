name: Feature request
description: Suggest an idea to make ByteClaw better
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the solution you'd like
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternatives considered?
