services:
  # ─────────────────────────────────────────────
  # ByteClaw Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm byteclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  byteclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: byteclaw-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.byteclaw/config.json:ro
      - byteclaw-workspace:/root/.byteclaw/workspace
      - byteclaw-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["byteclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # ByteClaw Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  byteclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: byteclaw-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.byteclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - byteclaw-workspace:/root/.byteclaw/workspace
      # NPM cache for faster MCP server installs
      - byteclaw-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  byteclaw-workspace:
  byteclaw-npm-cache: # Cache npm packages to speed up MCP server installations
