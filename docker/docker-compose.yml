services:
  # ─────────────────────────────────────────────
  # ByteClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm byteclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  byteclaw-agent:
    image: docker.io/ajmaluk/byteclaw:latest
    container_name: byteclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.byteclaw
    entrypoint: ["byteclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # ByteClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up byteclaw-gateway
  # ─────────────────────────────────────────────
  byteclaw-gateway:
    image: docker.io/ajmaluk/byteclaw:latest
    container_name: byteclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.byteclaw
